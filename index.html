<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huza Calc 52</title>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: Arial, sans-serif; }
        .calc { width: 320px; background: #000; padding: 20px; border-radius: 40px; border: 1px solid #333; }
        #display { width: 100%; height: 100px; background: transparent; border: none; color: white; text-align: right; font-size: 60px; margin-bottom: 10px; outline: none; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        button { height: 70px; width: 70px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; color: white; transition: 0.2s; }
        .num { background: #333; }
        .op { background: #ff9f0a; }
        .spec { background: #a5a5a5; color: black; }
        button:active { opacity: 0.7; }
        .zero { grid-column: span 2; width: 152px; border-radius: 40px; text-align: left; padding-left: 30px; }
    </style>
</head>
<body>
    <div class="calc">
        <input type="text" id="display" readonly value="0">
        <div class="buttons">
            <button class="spec" onclick="clearDisplay()">AC</button>
            <button class="spec" onclick="append('/')">/</button>
            <button class="spec" onclick="append('*')">×</button>
            <button class="op" onclick="append('-')">-</button>
            <button class="num" onclick="append('7')">7</button>
            <button class="num" onclick="append('8')">8</button>
            <button class="num" onclick="append('9')">9</button>
            <button class="op" onclick="append('+')">+</button>
            <button class="num" onclick="append('4')">4</button>
            <button class="num" onclick="append('5')">5</button>
            <button class="num" onclick="append('6')">6</button>
            <button class="op" onclick="calculate()">=</button>
            <button class="num" onclick="append('1')">1</button>
            <button class="num" onclick="append('2')">2</button>
            <button class="num" onclick="append('3')">3</button>
            <button class="num zero" onclick="append('0')">0</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const eggs = {
            52: "52 — ДА ПРИБУДЕТ СИЛА! 👑",
            42: "42 — Ответ на всё 🤔",
            228: "ООООООО ПОСХАЛКО 🔥",
            69: "НИЦЕ 😏",
            1488: "ООООООО ПОСХАЛКО 💀",
            666: "Адский результат 😈",
            1337: "LEET HACKER 💻"
        };

        function append(char) {
            if (display.value === "0") display.value = char;
            else display.value += char;
        }

        function clearDisplay() { display.value = "0"; }

        function calculate() {
            try {
                let res = eval(display.value);
                display.value = res;
                if (eggs[res]) {
                    setTimeout(() => alert(eggs[res]), 100);
                }
            } catch {
                display.value = "Ошибка";
            }
        }
    </script>
</body>
</html>
