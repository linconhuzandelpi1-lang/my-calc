<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 Huza Calc 52</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
        }

        /* Падающие эмодзи */
        .emoji {
            position: fixed;
            font-size: 30px;
            animation: fall linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        .calc {
            width: 380px;
            background: rgba(10, 10, 10, 0.98);
            padding: 25px;
            border-radius: 35px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.7);
            position: relative;
            z-index: 1;
        }

        h1 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 10px;
            font-weight: bold;
            animation: rainbow 3s linear infinite;
        }

        @keyframes rainbow {
            0% { color: #FFD700; text-shadow: 0 0 15px #FFD700; }
            50% { color: #FF8C00; text-shadow: 0 0 15px #FF8C00; }
            100% { color: #FFD700; text-shadow: 0 0 15px #FFD700; }
        }

        #combo {
            text-align: center;
            color: #FF4500;
            font-size: 14px;
            font-weight: bold;
            min-height: 20px;
            margin-bottom: 5px;
        }

        #display {
            width: 100%;
            height: 100px;
            background: transparent;
            border: none;
            color: white;
            text-align: right;
            font-size: 52px;
            margin-bottom: 10px;
            outline: none;
            font-weight: 300;
            transition: all 0.3s;
        }

        #subtitle {
            text-align: center;
            color: #777;
            font-size: 13px;
            margin-bottom: 20px;
            min-height: 20px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 70px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: all 0.15s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        button:active {
            transform: scale(0.92);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
        }

        button:hover {
            filter: brightness(1.15);
        }

        .num { background: #333333; }
        .op { background: #FF9F0A; }
        .spec { background: #A5A5A5; color: black; }
        .equals { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .zero {
            grid-column: span 2;
            border-radius: 40px;
        }

        /* Анимации */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px) rotate(-2deg); }
            75% { transform: translateX(15px) rotate(2deg); }
        }

        .shake { animation: shake 0.4s ease 3; }

        @keyframes rainbowBg {
            0% { background: rgba(255, 0, 0, 0.3); }
            20% { background: rgba(255, 255, 0, 0.3); }
            40% { background: rgba(0, 255, 0, 0.3); }
            60% { background: rgba(0, 255, 255, 0.3); }
            80% { background: rgba(0, 0, 255, 0.3); }
            100% { background: rgba(255, 0, 255, 0.3); }
        }

        .rainbow { animation: rainbowBg 1s linear 3; }

        @keyframes spin {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .spin { animation: spin 0.6s ease-in-out; }
    </style>
</head>
<body>
    <div class="calc" id="calc">
        <h1>👑 HUZA CALC 52 👑</h1>
        <div id="combo"></div>
        <input type="text" id="display" readonly value="0">
        <div id="subtitle">Самый прикольный калькулятор</div>
        <div class="buttons">
            <button class="spec" onclick="clearAll()">AC</button>
            <button class="spec" onclick="append('/')">/</button>
            <button class="spec" onclick="append('*')">×</button>
            <button class="op" onclick="append('-')">-</button>
            <button class="num" onclick="append('7')">7</button>
            <button class="num" onclick="append('8')">8</button>
            <button class="num" onclick="append('9')">9</button>
            <button class="op" onclick="append('+')">+</button>
            <button class="num" onclick="append('4')">4</button>
            <button class="num" onclick="append('5')">5</button>
            <button class="num" onclick="append('6')">6</button>
            <button class="equals" onclick="calculate()">=</button>
            <button class="num" onclick="append('1')">1</button>
            <button class="num" onclick="append('2')">2</button>
            <button class="num" onclick="append('3')">3</button>
            <button class="num zero" onclick="append('0')">0</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const subtitle = document.getElementById('subtitle');
        const comboEl = document.getElementById('combo');
        const calc = document.getElementById('calc');
        
        let clickCount = 0;
        let combo = 0;
        let comboTimer = null;
        let secretCode = "";

        const eggs = {
            52: "52 — ДА ПРИБУДЕТ СИЛА ХУЗЫ 👑",
            42: "42 — Ответ на главный вопрос жизни 🤔",
            228: "ООООООО ПОСХАЛКО 🔥🔥🔥",
            69: "НИЦЕ 😏😏😏",
            1488: "ЧТО ТЫ ТВОРИШЬ 💀💀💀",
            666: "👹 Число зверя! 😈",
            1337: "LEET HACKER MODE 💻🔓",
            0: "НОЛЬ. ПУСТОТА 🫵",
            100: "ИДЕАЛЬНАЯ СОТКА! 💯",
            404: "ERROR 404 🤖",
            13: "НЕСЧАСТЛИВОЕ ЧИСЛО 👻",
            777: "ДЖЕКПОТ! 🎰💰",
            1234: "ПРОСТАЯ ПОСЛЕДОВАТЕЛЬНОСТЬ 🔢",
            911: "EMERGENCY! 🚨",
            420: "RELAX MODE 🌿😎"
        };

        const phrases = [
            "Считаю... 🧮",
            "Серьёзно? 😐",
            "Хуза одобряет 👑",
            "Математика — просто 🤓",
            "Легкотня 💪",
            "BOOM! 💥",
            "Вау, так сложно! 🤯"
        ];

        // Падающие эмодзи
        function createEmoji() {
            const emojis = ['👑', '🔥', '💯', '😏', '💀', '✨'];
            const emoji = document.createElement('div');
            emoji.className = 'emoji';
            emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = Math.random() * 100 + '%';
            emoji.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(emoji);
            setTimeout(() => emoji.remove(), 7000);
        }
        setInterval(createEmoji, 600);

        function append(char) {clickCount++;
            combo++;
            
            // Комбо-система
            if (combo > 10) {
                comboEl.textContent = `🔥 КОМБО x${combo} 🔥`;
            }
            
            // Сброс комбо через 2 секунды
            clearTimeout(comboTimer);
            comboTimer = setTimeout(() => {
                combo = 0;
                comboEl.textContent = "";
            }, 2000);

            // Секретный код 5252
            if (char >= '0' && char <= '9') {
                secretCode += char;
                if (secretCode.slice(-4) === "5252") {
                    rainbowFlash();
                    shake();
                    createFirework(30);
                    alert("🔓 СЕКРЕТ ОТКРЫТ!\n\nТЫ НАШЁЛ СЕКРЕТНЫЙ КОД 5252!\n👑 ХУЗА-МАСТЕР 👑");
                    secretCode = "";
                }
            }

            // 52 клика
            if (clickCount === 52) {
                rainbowFlash();
                shake();
                createFirework(25);
                alert("👑 ЛЕГЕНДА!\n\n52 НАЖАТИЯ!\nТЫ ДОСТИГ ПРОСВЕТЛЕНИЯ!\n👑 ХУЗА БЛАГОСЛОВЛЯЕТ ТЕБЯ 👑");
            }

            // 100 кликов
            if (clickCount === 100) {
                shake();
                createFirework(20);
                alert("💯 СОТКА!\n\n100 НАЖАТИЙ!\nТЫ ЗАВИСИМ ОТ КАЛЬКУЛЯТОРА! 😂");
            }

            if (display.value === "0" || display.value === "Ошибка") {
                display.value = char;
            } else if (display.value.length < 15) {
                display.value += char;
            } else {
                shake();
                subtitle.textContent = "ХВАТИТ ЦИФР! 😤";
            }
        }

        function clearAll() {
            display.value = "0";
            if (Math.random() < 0.1) {
                subtitle.textContent = "Боишься результата? 😏";
            } else {
                subtitle.textContent = "Всё сброшено 🧹";
            }
        }

        function calculate() {
            try {
                const expr = display.value.replace(/×/g, '*').replace(/÷/g, '/');
                
                // Пасхалка на 1+1
                if (expr === "1+1") {
                    const responses = [
                        "2 (надеюсь, ты это знал) 🤦",
                        "Серьёзно? 1+1? 😑",
                        "2, но я разочарован 😔"
                    ];
                    subtitle.textContent = responses[Math.floor(Math.random() * responses.length)];
                }

                let result = eval(expr);

                if (!isFinite(result)) throw new Error();

                // Округление
                if (Number.isInteger(result)) {
                    result = Math.round(result);
                } else {
                    result = Math.round(result * 1000000) / 1000000;
                }

                // Анимация для больших чисел
                if (Math.abs(result) > 100) {
                    spinNumber(result);
                } else {
                    display.value = result;
                }

                // Проверка пасхалок
                if (eggs[result]) {
                    shake();
                    rainbowFlash();
                    createFirework(20);
                    setTimeout(() => alert("🔥 ПАСХАЛКО!\n\n" + eggs[result]), 200);
                } 
                // Огромные числа
                else if (Math.abs(result) > 999999) {
                    shake();
                    createFirework(15);
                    alert("💥 ПЕРЕПОЛНЕНИЕ!\n\nСЛИШКОМ БОЛЬШОЕ ЧИСЛО!\nМАТЕМАТИКА СЛОМАЛАСЬ! 💥");
                }
                // Отрицательные числа
                else if (result < 0 && Math.random() < 0.15) {
                    subtitle.textContent = "Минус? Грустно... 😢";
                }
                // Простые числа
                else if (Number.isInteger(result) && result > 1 && isPrime(result) && Math.random() < 0.2) {
                    subtitle.textContent = `${result} — простое число! 🔢✨`;
                }
                else {
                    subtitle.textContent = phrases[Math.floor(Math.random() * phrases.length)];
                }

            } catch (e) {
                if (display.value.includes('/0')) {
                    shake();
                    display.style.background = "#FF0000";
                    setTimeout(() => display.style.background = "transparent", 500);
                    createFirework(10);
                    alert("💀 КАТАСТРОФА!\n\nНА НОЛЬ ДЕЛИТЬ НЕЛЬЗЯ!\nТЫ УНИЧТОЖИЛ ВСЕЛЕННУЮ! 💀🌌");
                    display.value = "0";
                } else {
                    display.value = "Ошибка";
                    subtitle.textContent = "Что-то пошло не так 🤷";
                }
            }
        }

        // Вращение чисел
        function spinNumber(target) {
            let steps = 0;
            const interval = setInterval(() => {
                if (steps >= 25) {
                    clearInterval(interval);
                    display.value = target;
                    return;
                }
                display.value = Math.floor(Math.random() * 10000);
                steps++;
            }, 40);
        }

        // Проверка простого числа
        function isPrime(n) {
            if (n < 2) return false;
            for (let i = 2; i <= Math.sqrt(n); i++) {
                if (n % i === 0) return false;
            }
            return true;
        }

        function shake() {
            calc.classList.add('shake');
            setTimeout(() => calc.classList.remove('shake'), 1200);
        }

        function rainbowFlash() {
            calc.classList.add('rainbow');
            setTimeout(() => calc.classList.remove('rainbow'), 3000);
        }

        // Улучшенные фейерверки
        function createFirework(count = 15) {
            const symbols = ['💥', '✨', '🎉', '⭐', '🌟', '💫', '🔥', '👑'];
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const fw = document.createElement('div');
                    fw.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                    fw.style.position = 'fixed';
                    fw.style.left = Math.random() * 100 + '%';
                    fw.style.top = Math.random() * 100 + '%';
                    fw.style.fontSize = (20 + Math.random() * 30) + 'px';
                    fw.style.zIndex = '9999';
                    fw.style.animation = 'fall 2s ease-out';
                    fw.style.pointerEvents = 'none';
                    document.body.appendChild(fw);
                    setTimeout(() => fw.remove(), 2000);
                }, i * 70);
            }
        }

        // Звуковые эффекты (опционально)
        function playSound(freq, duration) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                oscillator.type = 'sine';
                oscillator.frequency.value = freq;
                oscillator.connect(audioCtx.destination);
                oscillator.start();
                setTimeout(() => oscillator.stop(), duration);
            } catch(e) {}
        }

        // Добавляем звук при нажатии кнопок
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => playSound(200, 50));
        });
    </script>
</body>
</html>
